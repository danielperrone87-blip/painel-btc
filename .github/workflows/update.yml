name: Atualizar painel

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      enviar_telegram:
        description: "Enviar o resumo no Telegram nesta execução?"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: atualizar-painel
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar dados e gerar data.json
        run: python scripts/build_data.py

      - name: Publicar data.json
        run: |
          git config user.name  "painel-bot"
          git config user.email "painel-bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Nada mudou."
          else
            git commit -m "dados: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Enviar resumo no Telegram
        if: github.event.schedule == '0 0 * * *' || inputs.enviar_telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PANEL_URL: ${{ vars.PANEL_URL }}
        run: python scripts/send_telegram.py
