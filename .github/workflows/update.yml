name: Atualizar painel

on:
  schedule:
    # A cada 30 min: mantém o painel fresco para a leitura da manhã.
    - cron: "*/30 * * * *"
    # 00:00 UTC = 21h de Brasília — fechamento da vela diária + Telegram.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      enviar_telegram:
        description: "Enviar o resumo no Telegram nesta execução?"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: atualizar-painel
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar dados e gerar data.json
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: python scripts/build_data.py

      - name: Publicar data.json
        run: |
          git config user.name  "painel-bot"
          git config user.email "painel-bot@users.noreply.github.com"
          # inclui os dois arquivos gerados (data.json e o gráfico)
          git add data.json chart.json 2>/dev/null || git add data.json
          if git diff --staged --quiet; then
            echo "Nada mudou."
          else
            git commit -m "dados: $(date -u '+%Y-%m-%d %H:%M UTC')"
            # "puxar antes de empurrar": evita o conflito quando algo foi
            # editado no repositório enquanto o build rodava. Tenta até 3x.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push $i falhou, tentando de novo..."
              sleep 3
            done
          fi

      # Só dispara no cron das 21h ou se você pedir manualmente.
      - name: Enviar resumo no Telegram
        if: github.event.schedule == '0 0 * * *' || inputs.enviar_telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PANEL_URL: ${{ vars.PANEL_URL }}
        run: python scripts/send_telegram.py
